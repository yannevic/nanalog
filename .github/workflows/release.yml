name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'CHANGELOG_NEXT.md'

jobs:
  build:
    runs-on: windows-latest
    if: "!contains(github.event.head_commit.author.name, 'github-actions[bot]')"
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Corrigir distutils para Python 3.12
        run: pip install setuptools

      - name: Instalar dependências
        run: npm install

      - name: Bump de versão
        id: bump
        shell: bash
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('./package.json', 'utf8'));
            pkg.version = '$NEW_VERSION';
            fs.writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Ler changelog
        id: changelog
        shell: bash
        run: |
          BODY=$(cat CHANGELOG_NEXT.md)
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit da versão
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: release v${{ steps.bump.outputs.new_version }}"
          git push

      - name: Criar release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.new_version }}
          name: Nanalog v${{ steps.bump.outputs.new_version }}
          body: ${{ steps.changelog.outputs.body }}
          files: |
            release/Nanalog Setup ${{ steps.bump.outputs.new_version }}.exe
            release/Nanalog Setup ${{ steps.bump.outputs.new_version }}.exe.blockmap
            release/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
